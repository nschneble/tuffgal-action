<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Tuffgal Action fixture</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #3b82f6;
      }
      main {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        height: 100%;
      }
      main > div {
        height: 100%;
      }
      main > div:nth-child(1) {
        background: #ef4444;
      }
      main > div:nth-child(2) {
        background: #10b981;
      }
      main > div:nth-child(3) {
        background: #f59e0b;
      }
      main > div:nth-child(4) {
        background: #6366f1;
      }
    </style>
  </head>
  <body>
    <main role="main" aria-label="smoke fixture">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </main>
  </body>
</html>
